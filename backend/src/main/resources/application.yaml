server:
  port: 8080
  servlet:
    context-path: /api

spring:
  config:
    import: optional:file:.env[.properties]

  application:
    name: water-leakage-backend

  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL:jdbc:postgresql://192.168.4.20:5432/water_leakage_system}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

app:
  token-secret: ${TOKEN_SECRET:water-leakage-local-development-secret-change-me}
  token-expire-hours: 12
  upload-dir: ${UPLOAD_DIR:uploads}

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.donghai.leakage: debug
